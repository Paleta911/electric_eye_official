<main class="auth-page">
  <div class="animated-background" aria-hidden="true">
    @for (icon of iconos; track $index) {
      <i class="fas floating-icon" [ngClass]="icon.class"
        [style.left.%]="icon.left" [style.animationDuration.s]="icon.duration"
        [style.animationDelay.s]="icon.delay" [style.fontSize.px]="icon.size"></i>
    }
  </div>

  <section class="auth-card" aria-labelledby="activation-title">
    <a routerLink="/" class="brand-link" aria-label="Volver al inicio de Electric Eye">
      <img src="assets/logo.png" alt="" class="auth-logo" />
      <span>Electric Eye</span>
    </a>
    <h1 id="activation-title">Activar servicio</h1>
    <p class="auth-subtitle">Vincula tu cuenta con una clave de un solo uso.</p>

    <div class="status-message status-info" role="status">{{ aviso }}</div>

    <form class="auth-form" (ngSubmit)="activar()">
      <div class="form-field">
        <label for="activation-key">Clave de activación</label>
        <div class="input-icon-wrapper">
          <i class="fas fa-key input-icon" aria-hidden="true"></i>
          <input id="activation-key" type="text" class="auth-input code-input"
            [(ngModel)]="clave" name="clave" autocomplete="off"
            [disabled]="cargando" maxlength="64" required autofocus />
        </div>
      </div>

      @if (mensaje) {
        <div class="status-message" [ngClass]="exito ? 'status-success' : 'status-error'"
          [attr.role]="exito ? 'status' : 'alert'">{{ mensaje }}</div>
      }

      <button type="submit" class="primary-action" [disabled]="cargando">
        {{ cargando ? 'Activando…' : 'Activar servicio' }}
      </button>
      <button type="button" class="secondary-action" (click)="cerrarSesion()">Cerrar sesión</button>
    </form>
  </section>
</main>
