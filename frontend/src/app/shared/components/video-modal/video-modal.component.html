@if (isOpen) {
  <div class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn" (click)="cerrarModal()">✖</span>
      <video controls autoplay>
        <source [src]="videoSrc" type="video/mp4">
        Tu navegador no soporta el video.
      </video>
    </div>
  </div>
}
