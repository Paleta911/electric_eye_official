<header class="navbar">
  <div class="left-section">
    <time class="fecha-completa">{{ fechaActual }}</time>
  </div>

  <div class="right-section">
    <button type="button" class="tema-toggle" (click)="toggleTema()"
      [attr.aria-label]="modoOscuro ? 'Activar tema claro' : 'Activar tema oscuro'"
      [title]="modoOscuro ? 'Tema claro' : 'Tema oscuro'">
      <i class="fas" [ngClass]="modoOscuro ? 'fa-sun' : 'fa-moon'" aria-hidden="true"></i>
    </button>

    <button type="button" class="btn-ir-inicio" (click)="irAlInicio()">
      <i class="fas fa-home" aria-hidden="true"></i> Ir al inicio
    </button>

    <div class="usuario">
      <button type="button" class="usuario-trigger" (click)="toggleMenuUsuario()"
        [attr.aria-expanded]="mostrarMenuUsuario" aria-haspopup="menu">
        <span class="nombre-usuario">{{ nombreUsuario }}</span>
        <i class="fas fa-user-circle avatar-icon" aria-hidden="true"></i>
        <i class="fas fa-chevron-down flecha" aria-hidden="true"></i>
      </button>

      @if (mostrarMenuUsuario) {
        <div class="menu-usuario" role="menu">
          <button type="button" role="menuitem" (click)="abrirConfiguracion()">⚙ Configuración</button>
          <button type="button" role="menuitem" (click)="cerrarSesion()">Cerrar sesión</button>
        </div>
      }
    </div>
  </div>
</header>
